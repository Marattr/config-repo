app:
  greeting: "Merhaba Config Server'dan!"

server:
  port: 8082

spring:
  application:
    name: customer-service
  security:
    jwt:
      secret: ${JWT_SECRET:#ihs.com.tr!ihscomtr-secret-key#}
  datasource:
    url: jdbc:postgresql://localhost:5432/customer?currentSchema=customer
    username: murat
    password: ${DB_PASSWORD:murat}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      max-lifetime: 1800000
      keepalive-time: 60000
