server:
  port: 8080

spring:
  security:
    jwt:
      secret: ${JWT_SECRET:#ihs.com.tr!ihscomtr-secret-key#}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: currency-service
          uri: ${CURRENCY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/currency/**

        - id: customer-service
          uri: ${CUSTOMER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/customer/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
